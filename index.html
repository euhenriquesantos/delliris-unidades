<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Mukta:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --vinho-900:#2b0000; --vinho-700:#630b0b; --vinho-600:#7a1414;
    --creme-2:#fff9f1; --dourado:#e7b15a; --verde-claro:#389f00;
    --texto:#f1e3d3; --texto-suave:#cdaa9a;
    --radius:20px; --sombra:0 18px 50px -18px rgba(0,0,0,.6);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:"Mukta",sans-serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(231,177,90,.10), transparent 60%),
      radial-gradient(900px 500px at -10% 20%, rgba(122,20,20,.55), transparent 55%),
      linear-gradient(170deg, var(--vinho-900), #1c0000 90%);
    background-attachment:fixed; color:var(--texto); min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1120px;margin:0 auto;padding:0 22px}

  header.hero{text-align:center;padding:64px 22px 30px}
  .logo{width:min(340px,72%);height:auto;margin:0 auto 26px;display:block;filter:drop-shadow(0 6px 20px rgba(0,0,0,.35))}
  .selo{
    display:inline-flex;align-items:center;gap:8px;
    font-size:.78rem;letter-spacing:.22em;text-transform:uppercase;
    color:var(--dourado);font-weight:600;
    border:1px solid rgba(231,177,90,.35);padding:7px 16px;border-radius:999px;margin-bottom:22px;
  }
  .selo::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--dourado)}
  .hero h1{
    font-family:"Fraunces",serif;font-weight:600;
    font-size:clamp(2.4rem,6vw,4.2rem);line-height:1.02;color:var(--creme-2);letter-spacing:-.01em;
  }
  .hero h1 em{font-style:italic;color:var(--dourado)}
  .hero p{margin:18px auto 0;max-width:560px;font-size:1.08rem;color:var(--texto-suave);line-height:1.6}

  .toolbar{
    position:sticky;top:14px;z-index:30;margin:38px auto 8px;
    background:rgba(255,249,241,.06);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:1px solid rgba(255,249,241,.12);border-radius:var(--radius);padding:16px;
    display:grid;grid-template-columns:1.5fr 1fr 1fr;gap:12px;box-shadow:var(--sombra);
  }
  .field{position:relative}
  .field label{display:block;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--dourado);margin:0 0 7px 4px;font-weight:600}
  .field input,.field select{
    width:100%;font-family:"Mukta",sans-serif;font-size:1rem;color:var(--vinho-900);
    background:var(--creme-2);border:2px solid transparent;border-radius:14px;padding:13px 16px;
    outline:none;transition:border-color .2s, box-shadow .2s;appearance:none;
  }
  .field input::placeholder{color:#9b8170}
  .field input:focus,.field select:focus{border-color:var(--dourado);box-shadow:0 0 0 4px rgba(231,177,90,.18)}
  .field.select::after{content:"";position:absolute;right:16px;bottom:18px;width:9px;height:9px;border-right:2px solid var(--vinho-700);border-bottom:2px solid var(--vinho-700);transform:rotate(45deg);pointer-events:none}

  .resultcount{text-align:center;color:var(--texto-suave);font-size:.92rem;margin:14px 0 4px;letter-spacing:.02em}
  .resultcount b{color:var(--creme-2)}

  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;padding:18px 0 40px}
  .card{
    background:linear-gradient(160deg, rgba(255,249,241,.08), rgba(255,249,241,.03));
    border:1px solid rgba(255,249,241,.12);border-radius:var(--radius);padding:24px 24px 22px;
    position:relative;overflow:hidden;display:flex;flex-direction:column;
    transition:transform .25s ease, border-color .25s ease, box-shadow .25s ease;animation:rise .5s ease both;
  }
  .card::before{content:"";position:absolute;inset:0;background:radial-gradient(400px 160px at 100% 0%, rgba(231,177,90,.12), transparent 60%);opacity:0;transition:opacity .3s;pointer-events:none}
  .card:hover{transform:translateY(-4px);border-color:rgba(231,177,90,.45);box-shadow:var(--sombra)}
  .card:hover::before{opacity:1}
  .card .cidade{font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--dourado);font-weight:600;margin-bottom:8px}
  .card h3{font-family:"Fraunces",serif;font-weight:600;font-size:1.5rem;color:var(--creme-2);line-height:1.1}
  .card .endereco{margin-top:10px;color:var(--texto-suave);font-size:.97rem;line-height:1.5;display:flex;gap:8px}
  .card .endereco svg{flex:none;margin-top:2px}
  .card .acoes{margin-top:auto;padding-top:20px;display:flex;gap:10px;flex-wrap:wrap}
  .btn{flex:1;min-width:130px;text-decoration:none;text-align:center;font-weight:600;font-size:.98rem;padding:13px 14px;border-radius:999px;transition:background .2s,color .2s,transform .15s;cursor:pointer;border:0}
  .btn-primary{background:var(--creme-2);color:var(--vinho-700)}
  .btn-primary:hover{background:var(--verde-claro);color:#fff;transform:scale(1.02)}
  .btn-ghost{background:transparent;color:var(--creme-2);border:1.5px solid rgba(255,249,241,.3)}
  .btn-ghost:hover{background:rgba(255,249,241,.12)}

  .vazio{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--texto-suave)}
  .vazio span{font-size:2.6rem;display:block;margin-bottom:10px}

  footer{text-align:center;padding:34px 22px 50px;color:var(--texto-suave);font-size:.88rem;border-top:1px solid rgba(255,249,241,.08)}
  footer b{color:var(--dourado);font-family:"Fraunces",serif}

  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

  @media (max-width:780px){
    .toolbar{grid-template-columns:1fr 1fr;top:8px}
    .field.busca{grid-column:1/-1}
    .grid{grid-template-columns:1fr}
    .hero{padding-top:46px}
  }
</style>
</head>

/* ===================== fim da área editável ========================= */

const NOME_UF = {PR:"Paraná",SC:"Santa Catarina",RS:"Rio Grande do Sul",SP:"São Paulo",ES:"Espírito Santo",RN:"Rio Grande do Norte",RJ:"Rio de Janeiro",PE:"Pernambuco",AL:"Alagoas"};

const $busca=document.getElementById('busca');
const $estado=document.getElementById('estado');
const $cidade=document.getElementById('cidade');
const $grid=document.getElementById('grid');
const $contador=document.getElementById('contador');

const icoPin='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#e7b15a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0Z"/><circle cx="12" cy="10" r="3"/></svg>';

function normalizar(t){return (t||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')}

function montarEstados(){
  const ufs=[...new Set(UNIDADES.map(u=>u.uf))].sort((a,b)=>(NOME_UF[a]||a).localeCompare(NOME_UF[b]||b,'pt'));
  ufs.forEach(uf=>{
    const o=document.createElement('option');
    o.value=uf;o.textContent=NOME_UF[uf]?`${NOME_UF[uf]} (${uf})`:uf;
    $estado.appendChild(o);
  });
}

function montarCidades(){
  const ufSel=$estado.value;
  const atual=$cidade.value;
  const base=ufSel?UNIDADES.filter(u=>u.uf===ufSel):UNIDADES;
  const cidades=[...new Set(base.map(u=>u.cidade))].sort((a,b)=>a.localeCompare(b,'pt'));
  $cidade.innerHTML='<option value="">Todas</option>';
  cidades.forEach(c=>{
    const o=document.createElement('option');
    o.value=c;o.textContent=c;
    $cidade.appendChild(o);
  });
  if(cidades.includes(atual))$cidade.value=atual;
}

function render(){
  const termo=normalizar($busca.value);
  const ufSel=$estado.value;
  const cidadeSel=$cidade.value;

  let lista=UNIDADES.filter(u=>{
    if(ufSel && u.uf!==ufSel)return false;
    if(cidadeSel && u.cidade!==cidadeSel)return false;
    if(termo){
      const alvo=normalizar(`${u.nome} ${u.cidade} ${u.uf} ${NOME_UF[u.uf]||''} ${u.endereco}`);
      if(!alvo.includes(termo))return false;
    }
    return true;
  });

  lista.sort((a,b)=>a.cidade.localeCompare(b.cidade,'pt')||a.nome.localeCompare(b.nome,'pt'));

  $contador.innerHTML=lista.length?`<b>${lista.length}</b> ${lista.length===1?'unidade encontrada':'unidades encontradas'}`:'';

  if(!lista.length){
    $grid.innerHTML='<div class="vazio"><span>🍽️</span>Nenhuma unidade encontrada.<br>Tente outro termo, estado ou cidade.</div>';
    return;
  }

  $grid.innerHTML=lista.map((u,i)=>`
    <article class="card" style="animation-delay:${i*0.04}s">
      <div class="cidade">${u.cidade} · ${u.uf}</div>
      <h3>${u.nome}</h3>
      ${u.endereco?`<p class="endereco">${icoPin}<span>${u.endereco}</span></p>`:''}
      <div class="acoes">
        <a class="btn btn-primary" href="${u.pedido}" target="_blank" rel="noopener">Pedir agora</a>
        ${u.whatsapp?`<a class="btn btn-ghost" href="https://wa.me/${u.whatsapp}" target="_blank" rel="noopener">WhatsApp</a>`:''}
      </div>
    </article>
  `).join('');
}

montarEstados();
montarCidades();
render();
$busca.addEventListener('input',render);
$estado.addEventListener('change',()=>{montarCidades();render()});
$cidade.addEventListener('change',render);
</script>
